<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Nauthilus in der Mail-Landschaft</title>
  <desc id="desc">Architekturübersicht mit Postfix, pfxhttp, Dovecot, Rspamd, Web-Applikationen und Backends rund um Nauthilus.</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto-start-reverse">
      <path d="M 0 0 L 7 3.5 L 0 7 z" fill="#2c5e77"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .box { fill: #ffffff; stroke: #2c5e77; stroke-width: 3; rx: 18; ry: 18; }
      .box-alt { fill: #eef6f8; stroke: #2c5e77; stroke-width: 3; rx: 18; ry: 18; }
      .core { fill: #163b52; stroke: #163b52; stroke-width: 3; rx: 24; ry: 24; }
      .backend { fill: #fff6e8; stroke: #b36b00; stroke-width: 2.5; rx: 16; ry: 16; }
      .line { stroke: #2c5e77; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .line-dashed { stroke: #7a4d00; stroke-width: 4; fill: none; stroke-dasharray: 12 10; marker-end: url(#arrow); stroke-linecap: round; }
      .label { font: 700 26px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #163b52; text-anchor: middle; }
      .label-light { font: 700 30px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .small { font: 500 20px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #163b52; text-anchor: middle; }
      .small-left { font: 500 19px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #163b52; }
      .note { font: 500 20px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #163b52; text-anchor: middle; paint-order: stroke fill; stroke: #f6f8fb; stroke-width: 8; stroke-linejoin: round; }
      .accent { font: 700 20px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #7a4d00; text-anchor: middle; }
      .accent-note { paint-order: stroke fill; stroke: #f6f8fb; stroke-width: 8; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>

  <rect class="core" x="445" y="245" width="310" height="150"/>
  <text class="label-light" x="600" y="310">Nauthilus</text>
  <text class="small" x="600" y="345" fill="#e8f0f4">Zentrale Authentisierung</text>
  <text class="small" x="600" y="372" fill="#e8f0f4">Features, Hooks, OIDC</text>

  <rect class="box" x="60" y="270" width="170" height="88"/>
  <text class="label" x="145" y="322">Postfix</text>

  <rect class="box-alt" x="270" y="270" width="140" height="88"/>
  <text class="label" x="340" y="322">pfxhttp</text>

  <rect class="box" x="85" y="455" width="190" height="88"/>
  <text class="label" x="180" y="507">Dovecot</text>

  <rect class="box" x="905" y="210" width="200" height="88"/>
  <text class="label" x="1005" y="262">Rspamd</text>

  <rect class="box" x="875" y="455" width="260" height="88"/>
  <text class="label" x="1005" y="500">Web-Applikationen</text>
  <text class="small" x="1005" y="528">Browser und APIs</text>

  <rect class="backend" x="215" y="620" width="190" height="72"/>
  <text class="label" x="310" y="664">LDAP</text>

  <rect class="backend" x="505" y="620" width="190" height="72"/>
  <text class="label" x="600" y="664">Lua</text>

  <rect class="backend" x="795" y="620" width="190" height="72"/>
  <text class="label" x="890" y="664">(Test-Backend)</text>

  <path class="line" d="M 230 314 L 264 314"/>
  <path class="line" d="M 410 314 L 438 314"/>
  <path class="line" d="M 275 499 C 345 499 365 408 438 364"/>
  <path class="line" d="M 905 254 L 764 283"/>
  <path class="line" d="M 875 499 L 764 371"/>

  <path class="line-dashed" d="M 970 455 C 960 418 900 365 764 338"/>
  <text class="accent accent-note" x="882" y="404">OIDC</text>

  <path class="line" d="M 600 395 L 600 620"/>
  <text class="note" x="718" y="526">Backend-Anbindung</text>
  <text class="note" x="718" y="548">Identitäten, Claims, Status</text>

  <text class="note" x="300" y="244">Socket Maps, Policy, SASL</text>
  <text class="note" x="225" y="429">IMAP, POP3, Submission optional</text>
  <text class="note" x="1010" y="319">Hooks, Textmaps, Entscheidungen</text>
  <text class="note" x="1005" y="574">Login, Consent, MFA</text>

  <text class="small-left" x="60" y="65">Mail-Landschaft mit Nauthilus als zentralem Entscheidungs- und Integrationspunkt</text>
</svg>
